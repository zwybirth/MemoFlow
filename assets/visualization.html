<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕸️ MemoFlow 2.0 - 记忆图谱可视化</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #f1f5f9;
            overflow: hidden;
        }
        
        #graph-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        /* 控制面板 */
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(30, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            min-width: 280px;
        }
        
        .controls h1 {
            font-size: 1.3em;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .search-box input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
            outline: none;
        }
        
        .search-box input:focus {
            border-color: #6366f1;
        }
        
        .search-box button {
            padding: 10px 16px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        
        .stats {
            font-size: 0.9em;
            color: #94a3b8;
        }
        
        .stats div {
            margin: 6px 0;
        }
        
        /* 节点信息面板 */
        .node-info {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            width: 320px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
        }
        
        .node-info.active {
            display: block;
        }
        
        .node-info h3 {
            font-size: 1.1em;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .node-info .meta {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        
        .node-info .content {
            font-size: 0.9em;
            line-height: 1.6;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .relations-list {
            margin-top: 12px;
        }
        
        .relation-item {
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .relation-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .relation-item .rel-type {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 8px;
        }
        
        .rel-depends_on { background: rgba(231, 76, 60, 0.3); color: #e74c3c; }
        .rel-relates_to { background: rgba(52, 152, 219, 0.3); color: #3498db; }
        .rel-supersedes { background: rgba(155, 89, 182, 0.3); color: #9b59b6; }
        .rel-replies_to { background: rgba(46, 204, 113, 0.3); color: #2ecc71; }
        
        /* 图例 */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(30, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        
        .legend h4 {
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
            font-size: 0.8em;
            color: #94a3b8;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        /* SVG样式 */
        svg {
            width: 100%;
            height: 100%;
        }
        
        .node circle {
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .node:hover circle {
            filter: brightness(1.2);
        }
        
        .node text {
            font-size: 11px;
            fill: #f1f5f9;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        .link {
            fill: none;
            stroke-opacity: 0.6;
            transition: all 0.3s;
        }
        
        .link.depends_on { stroke: #e74c3c; stroke-dasharray: 5,5; }
        .link.relates_to { stroke: #3498db; }
        .link.supersedes { stroke: #9b59b6; stroke-dasharray: 10,5; }
        .link.replies_to { stroke: #2ecc71; }
        
        .link:hover {
            stroke-opacity: 1;
            stroke-width: 3px;
        }
        
        /* 搜索高亮动画 */
        @keyframes pulse {
            0%, 100% {
                stroke: #ffeb3b;
                stroke-width: 4;
                filter: drop-shadow(0 0 8px #ffeb3b) brightness(1.3);
            }
            50% {
                stroke: #ffd700;
                stroke-width: 6;
                filter: drop-shadow(0 0 15px #ffd700) brightness(1.5);
            }
        }
        
        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 5px #6366f1);
            }
            50% {
                filter: drop-shadow(0 0 15px #6366f1) brightness(1.2);
            }
        }
        
        .node.search-match circle {
            animation: pulse 0.8s ease-in-out infinite;
        }
        
        .node.search-match text {
            font-weight: bold;
            font-size: 13px;
            fill: #ffeb3b;
        }
    </style>
</head>
<body>
    <div id="graph-container">
        <!-- 控制面板 -->
        <div class="controls">
            <h1>🕸️ MemoFlow 2.0</h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索记忆...">
                <button onclick="searchMemory()">🔍</button>
            </div>
            <div class="stats">
                <div>记忆节点: <span id="node-count">-</span></div>
                <div>关系边: <span id="edge-count">-</span></div>
                <div style="margin-top: 10px; font-size: 0.8em; color: #6366f1;">
                    💡 拖拽节点调整布局<br>
                    💡 点击节点查看详情<br>
                    💡 滚轮缩放画布
                </div>
            </div>
        </div>
        
        <!-- 节点信息面板 -->
        <div class="node-info" id="node-info">
            <h3 id="node-title">记忆详情</h3>
            <div class="meta" id="node-meta"></div>
            <div class="content" id="node-content"></div>
            <div class="relations-list" id="node-relations"></div>
        </div>
        
        <!-- 图例 -->
        <div class="legend">
            <h4>关系类型</h4>
            <div class="legend-item">
                <div class="legend-color" style="background: #e74c3c;"></div>
                <span>依赖 (depends_on)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #3498db;"></div>
                <span>相关 (relates_to)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #9b59b6;"></div>
                <span>替代 (supersedes)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #2ecc71;"></div>
                <span>回复 (replies_to)</span>
            </div>
        </div>
    </div>
    
    <script>
        // 房间颜色映射
        const roomColors = {
            'kitchen': '#ff6b6b',
            'study': '#4ecdc4',
            'office': '#45b7d1',
            'garage': '#96ceb4',
            'bedroom': '#ffeaa7',
            'studio': '#dfe6e9',
            'living': '#a29bfe',
            'knowledge': '#74b9ff',
            'default': '#6366f1'
        };
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('graph_data.json');
                const data = await response.json();
                return data;
            } catch (e) {
                console.error('加载数据失败:', e);
                // 降级到模拟数据
                return {
                    nodes: [
                        { id: 'mf-7ee660', title: 'BANK-AI-MINI战略', room: 'living', radius: 20 },
                        { id: 'mf-b22629', title: 'Docker安装', room: 'knowledge', radius: 15 },
                    ],
                    links: [
                        { source: 'mf-b22629', target: 'mf-7ee660', type: 'depends_on' },
                    ]
                };
            }
        }
        
        // 初始化图谱
        async function initGraph() {
            const data = await loadData();
            
            // 保存到全局变量供其他函数使用
            window.graphData = data;
            
            document.getElementById('node-count').textContent = data.nodes.length;
            document.getElementById('edge-count').textContent = data.links.length;
            
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            const svg = d3.select('#graph-container')
                .append('svg')
                .attr('viewBox', [0, 0, width, height]);
            
            // 缩放行为
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            const g = svg.append('g');
            
            // 力导向模拟
            const simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links).id(d => d.id).distance(150))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => d.radius + 10));
            
            // 绘制连线
            const link = g.append('g')
                .selectAll('line')
                .data(data.links)
                .join('line')
                .attr('class', d => `link ${d.type}`)
                .attr('stroke-width', 2);
            
            // 绘制节点
            const node = g.append('g')
                .selectAll('.node')
                .data(data.nodes)
                .join('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            // 节点圆形
            node.append('circle')
                .attr('r', d => d.radius)
                .attr('fill', d => roomColors[d.room] || roomColors.default)
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .on('click', (event, d) => showNodeInfo(d));
            
            // 节点文字
            node.append('text')
                .attr('dx', d => d.radius + 5)
                .attr('dy', 4)
                .text(d => d.title.length > 20 ? d.title.slice(0, 20) + '...' : d.title);
            
            // 模拟更新位置
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node
                    .attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            // 拖拽函数
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
        }
        
        // 显示节点信息
        async function showNodeInfo(node) {
            console.log('showNodeInfo called, node:', node);
            const panel = document.getElementById('node-info');
            const nodeId = node.id;
            
            // 从全局数据获取完整节点信息（D3传递的node可能不包含content）
            let fullNode = null;
            if (window.graphData && window.graphData.nodes) {
                fullNode = window.graphData.nodes.find(n => n.id === nodeId);
                console.log('Found fullNode:', fullNode ? 'yes' : 'no');
                if (fullNode) {
                    console.log('fullNode has content:', !!fullNode.content);
                    console.log('content length:', fullNode.content ? fullNode.content.length : 0);
                }
            }
            
            if (!fullNode) {
                fullNode = node;
                console.log('Using passed node instead');
            }
            
            document.getElementById('node-title').textContent = fullNode.title || node.title || '无标题';
            document.getElementById('node-meta').innerHTML = `
                ID: ${nodeId}<br>
                房间: ${fullNode.room || node.room || 'living'}<br>
                情绪: ${fullNode.emotion || node.emotion || 'neutral'}<br>
                连接数: ${countConnections(nodeId)}
            `;
            
            // 直接显示内容（如果存在）
            let content = fullNode.content;
            if (!content && fullNode.summary) {
                content = fullNode.summary;
            }
            if (!content) {
                content = '(暂无详细内容)';
            }
            console.log('Setting content:', content.substring(0, 100) + '...');
            document.getElementById('node-content').textContent = content;
            
            // 加载关系
            loadRelations(nodeId);
            
            panel.classList.add('active');
        }
        
        // 从 graph_data.json 加载节点完整内容
        async function loadNodeContent(nodeId) {
            try {
                let data;
                
                // 优先使用全局数据，避免重复请求
                if (window.graphData && window.graphData.nodes) {
                    data = window.graphData;
                } else {
                    const response = await fetch('graph_data.json?t=' + Date.now());
                    data = await response.json();
                }
                
                // 查找节点完整信息
                const fullNode = data.nodes.find(n => n.id === nodeId);
                if (fullNode && fullNode.content) {
                    document.getElementById('node-content').textContent = fullNode.content;
                } else if (fullNode && fullNode.summary) {
                    document.getElementById('node-content').textContent = fullNode.summary;
                } else {
                    document.getElementById('node-content').textContent = '(暂无详细内容)';
                }
            } catch (e) {
                console.error('加载内容失败:', e);
                document.getElementById('node-content').textContent = '(加载失败)';
            }
        }
        
        function countConnections(nodeId) {
            // 从全局 data 计算连接数
            if (window.graphData && window.graphData.links) {
                return window.graphData.links.filter(l => 
                    l.source.id === nodeId || l.target.id === nodeId ||
                    l.source === nodeId || l.target === nodeId
                ).length;
            }
            return 0;
        }
        
        function loadRelations(nodeId) {
            const container = document.getElementById('node-relations');
            container.innerHTML = '<h4>关联记忆</h4>';
            
            if (!window.graphData || !window.graphData.links) {
                container.innerHTML += '<div class="relation-item">暂无关联</div>';
                return;
            }
            
            // 查找相关连接
            const relations = window.graphData.links.filter(l => 
                l.source.id === nodeId || l.target.id === nodeId ||
                l.source === nodeId || l.target === nodeId
            );
            
            if (relations.length === 0) {
                container.innerHTML += '<div class="relation-item">暂无关联</div>';
                return;
            }
            
            relations.forEach(rel => {
                const isSource = (rel.source.id === nodeId || rel.source === nodeId);
                const otherNode = isSource ? 
                    (rel.target.id || rel.target) : 
                    (rel.source.id || rel.source);
                const otherNodeData = window.graphData.nodes.find(n => n.id === otherNode);
                const otherTitle = otherNodeData ? otherNodeData.title : otherNode;
                
                container.innerHTML += `
                    <div class="relation-item" onclick="focusNode('${otherNode}')">
                        <span class="rel-type rel-${rel.type}">${rel.type}</span>
                        ${isSource ? '→' : '←'} ${otherTitle}
                    </div>
                `;
            });
        }
        
        function focusNode(nodeId) {
            // 聚焦到指定节点
            const node = window.graphData.nodes.find(n => n.id === nodeId);
            if (node) {
                showNodeInfo(node);
            }
        }
        
        function searchMemory() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (!query) return;
            
            if (!window.graphData || !window.graphData.nodes) {
                alert('数据尚未加载完成，请稍后再试');
                return;
            }
            
            // 清除之前的高亮
            d3.selectAll('.node').classed('search-match', false);
            
            // 在节点标题和内容中搜索
            const results = window.graphData.nodes.filter(n => 
                (n.title && n.title.toLowerCase().includes(query)) ||
                (n.content && n.content.toLowerCase().includes(query))
            );
            
            if (results.length === 0) {
                alert(`未找到包含 "${query}" 的记忆`);
                return;
            }
            
            // 获取第一个匹配节点的位置用于聚焦
            const firstMatch = results[0];
            
            // 对所有匹配节点添加闪烁动画
            d3.selectAll('.node')
                .classed('search-match', d => {
                    const isMatch = results.some(r => r.id === d.id);
                    return isMatch;
                });
            
            // 平滑滚动到第一个匹配的节点
            if (firstMatch && firstMatch.x !== undefined && firstMatch.y !== undefined) {
                const svg = d3.select('svg');
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                // 计算目标缩放和平移
                const targetScale = 1.5;
                const targetX = width / 2 - firstMatch.x * targetScale;
                const targetY = height / 2 - firstMatch.y * targetScale;
                
                // 平滑过渡动画
                svg.transition()
                    .duration(750)
                    .call(
                        d3.zoom().transform,
                        d3.zoomIdentity.translate(targetX, targetY).scale(targetScale)
                    );
            }
            
            // 显示第一个匹配节点的详情
            showNodeInfo(firstMatch);
            
            // 5秒后移除闪烁效果
            setTimeout(() => {
                d3.selectAll('.node').classed('search-match', false);
            }, 5000);
            
            // 显示搜索结果提示
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(135deg, #6366f1, #4f46e5);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 1000;
                box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
                animation: fadeInOut 3s ease-in-out;
            `;
            notification.textContent = `✨ 找到 ${results.length} 个匹配的记忆节点`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
            
            console.log(`找到 ${results.length} 个匹配结果`, results.map(r => r.title));
        }
        
        // 添加淡入淡出动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
                10% { opacity: 1; transform: translateX(-50%) translateY(0); }
                90% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            }
        `;
        document.head.appendChild(style);
        
        // 支持回车键搜索
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchMemory();
                    }
                });
            }
        });
        
        // 启动
        initGraph();
    </script>
</body>
</html>
